<div class="generator">

    <div class="display-card">
        <span class="password-text" [class.placeholder]="!password()">
            {{ password() || '— click generate —' }}
        </span>
        <button class="btn btn--icon" [class.btn--success]="copied()" [disabled]="!password()" (click)="copy()"
            aria-label="Copy password">
            <span class="icon">{{ copied() ? '✓' : '⎘' }}</span>
            {{ copied() ? 'Copied' : 'Copy' }}
        </button>
    </div>

    <app-strength-meter [strength]="strength()" />

    <app-settings-panel [(options)]="options" />

    <button class="btn btn--generate" [disabled]="activeCount === 0" (click)="generate()">
        ↻ Generate password
    </button>

</div>
